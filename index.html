<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>吻安です</title>
  <link rel="icon" href="neko.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* ================= 1. 背景图片设置 ================= */
    body {
      background-image: url('tezcatlipoca.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
    }

    /* ================= 2. 头像样式设置 ================= */
    .app-name-link img {
      width: 80px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    /* ================= 3. 修改正文字号 ================= */
    .markdown-section {
      font-size: 18px;
      line-height: 1.4;
    }

    .markdown-section h1 {
      font-size: 34px !important;
    }

    .markdown-section h2 {
      font-size: 27px !important;
    }

    .markdown-section h3 {
      font-size: 20px !important;
    }

    /* ================= 4. 修改左侧目录字号 ================= */
    .sidebar ul li a {
      font-size: 14px !important;
    }

    .sidebar-nav li {
      margin: 4px 0;
    }

    /* 固定半透明遮罩层 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.85);
      z-index: -1;
      pointer-events: none;
    }


    /* 调整 h2、h3 与下方正文的距离 */
    .markdown-section h2,
    .markdown-section h3 {
      margin-bottom: 0.3em;
      /* 减小此值使间距更小，增大则间距变大 */
    }

    /* 若需要单独调整 h1 的间距，可额外添加 */
    .markdown-section h1 {
      margin-bottom: 0.5em;
    }
  </style>
</head>

<body>
  <div id="app">网页加载中，请稍候...</div>

  <script>
    window.$docsify = {
      // ================= 基础信息设置 =================
      name: '<img src="neko.png"><br>吻安的主页',
      repo: 'wenan4/wenan4.github.io',

      // ================= 目录设置 =================
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      // ================= 搜索功能 =================
      search: {
        paths: 'auto',
        placeholder: '搜索',
        noData: '😞 找不到结果desuwa',
        depth: 3,
        namespace: 'docsify-search-v2',  // 修改 v1 → v2 → v3 来强制刷新搜索缓存
        localSearch: {
          search: true
        }
      }
    };
  </script>

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prismjs@1/themes/prism.css" />
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-core.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16.7/dist/katex.min.css">
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.7/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@1/dist/docsify-katex.min.js"></script>
</body>

</html>
